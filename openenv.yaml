spec_version: 1
name: procurement-contract-audit
type: text
runtime: python
app: server/app.py
port: 7860

config:
  API_BASE_URL: https://router.huggingface.co/v1
  MODEL_NAME: Qwen/Qwen2.5-72B-Instruct

tasks:
