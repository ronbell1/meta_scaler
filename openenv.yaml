spec_version: 1
name: procurement-contract-audit
type: text
runtime: python
app: server/app.py
port: 7860

config:
  # API_BASE_URL is intentionally omitted — the validator injects its own
  # LiteLLM proxy URL via the API_BASE_URL environment variable at runtime.
  # Hardcoding it here would bypass the proxy and fail the LLM criteria check.
  MODEL_NAME: Qwen/Qwen2.5-72B-Instruct

tasks:
  easy:
    description: 2 violations in 1,500-word MSA, clearly labeled sections
    max_steps: 5
    grader:
      type: score
      endpoint: /grade
  medium:
    description: 5 violations in 3,000-word MSA with 1 red herring
    max_steps: 10
    grader:
      type: score
      endpoint: /grade
  hard:
    description: Multi-document MSA+SOW+DPA with cross-document violations
    max_steps: 15
    grader:
      type: score
      endpoint: /grade
